<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>เช็คอิน เพชรธงชัย</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="เช็คอิน">
<meta name="theme-color" content="#e53935">
<link rel="apple-touch-icon" href="icon.png">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#f0f4f8;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:20px}
.card{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:480px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.logo{text-align:center;margin-bottom:16px}
.logo h1{color:#e53935;font-size:20px}
.logo p{color:#666;font-size:13px}
.progress{display:flex;gap:4px;margin-bottom:16px}
.bar{flex:1;height:6px;border-radius:3px;background:#e0e0e0;transition:all .3s}
.bar.active{background:#ff9800}
.bar.done{background:#4caf50}
#statusBox{padding:14px;border-radius:10px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-all;background:#fff8e1;border:1px solid #ffe082;color:#5d4037}
#statusBox.error{background:#ffebee;border-color:#ef9a9a;color:#c62828}
#statusBox.success{background:#e8f5e9;border-color:#a5d6a7;color:#2e7d32}
.section{margin-top:16px}
label{font-size:14px;color:#555;display:block;margin-bottom:4px}
input,select{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:'Sarabun',sans-serif}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:16px;font-family:'Sarabun',sans-serif;cursor:pointer;margin-top:10px;font-weight:bold}
.btn-green{background:#4caf50;color:#fff}
.btn-orange{background:#ff9800;color:#fff}
.btn-gray{background:#9e9e9e;color:#fff}
.btn:disabled{background:#ccc;cursor:not-allowed}
#screenRegister,#screenCheckin,#screenSuccess{display:none}
#cameraVideo{width:100%;border-radius:8px;background:#000;margin-top:6px;display:none}
.photo-preview{width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin-top:8px;display:none}
#debugBox{margin-top:12px;font-size:11px;color:#999;background:#f5f5f5;padding:8px;border-radius:6px;display:none;word-break:break-all}
</style>
</head>
<body>
<div class="card">

  <!-- ปุ่มกลับ -->
  <div style="margin-bottom:12px">
    <button onclick="goHome()"
      style="background:none;border:1px solid #ddd;border-radius:20px;
             padding:6px 16px;font-size:13px;color:#666;cursor:pointer;
             font-family:'Sarabun',sans-serif">← กลับ</button>
  </div>

  <div class="logo">
    <h1>⏰ เช็คอินเพชรธงชัย</h1>
    <p>บริษัท เพชรธงชัย เทรดดิ้ง จำกัด</p>
  </div>
  <div class="progress">
    <div class="bar" id="b1"></div>
    <div class="bar" id="b2"></div>
    <div class="bar" id="b3"></div>
    <div class="bar" id="b4"></div>
  </div>
  <div id="statusBox">⏳ กำลังโหลด...</div>

  <!-- หน้าลงทะเบียน -->
  <div id="screenRegister">
    <div class="section">
      <label>ชื่อ-นามสกุล *</label>
      <input id="regName" type="text" placeholder="เช่น สมชาย ใจดี">
    </div>
    <div class="section">
      <label>แผนก *</label>
      <select id="regDept">
        <option value="">-- เลือกแผนก --</option>
        <option>เซลล์</option>
        <option>คลังสินค้า</option>
        <option>ขนส่ง</option>
        <option>บัญชี</option>
        <option>แอดมิน</option>
        <option>ฝ่ายบุคคล</option>
      </select>
    </div>
    <div class="section">
      <label>ตำแหน่ง</label>
      <input id="regPosition" type="text" placeholder="เช่น พนักงานขาย">
    </div>
    <div class="section">
      <label>เบอร์โทร</label>
      <input id="regPhone" type="tel" placeholder="เช่น 0812345678">
    </div>
    <button class="btn btn-green" onclick="submitRegister()">✅ ลงทะเบียน</button>
  </div>

  <!-- หน้าเช็คอิน -->
  <div id="screenCheckin">
    <div class="section" id="empInfo"
         style="background:#e3f2fd;padding:12px;border-radius:8px;font-size:14px"></div>

    <div class="section">
      <label>📍 เลือกสถานที่เช็คอิน *</label>
      <select id="locationSelect" style="margin-top:6px" onchange="onLocationChange()">
        <option value="">-- กรุณาเลือกสถานที่ --</option>
        <option value="0">🏢 สำนักงานใหญ่ / คลังสินค้า</option>
        <option value="1">🏪 มินิออฟฟิศ ลาดพร้าว 114</option>
      </select>
    </div>

    <button class="btn btn-orange" id="gpsBtn" onclick="checkGPS()"
            style="margin-top:12px" disabled>📍 ตรวจสอบตำแหน่ง GPS</button>

    <div class="section">
      <label>📷 ถ่ายรูปยืนยันตัวตน * (ใช้กล้องเท่านั้น)</label>
      <video id="cameraVideo" autoplay playsinline></video>
      <img id="photoPreview" class="photo-preview">
      <button class="btn btn-orange" id="captureBtn" onclick="capturePhoto()" style="display:none">📷 ถ่ายรูป</button>
      <button class="btn btn-gray"   id="retakeBtn"  onclick="retakePhoto()"  style="display:none">🔄 ถ่ายใหม่</button>
    </div>

    <button class="btn btn-green" id="submitBtn" onclick="submitCheckin()" disabled>✅ ยืนยันเช็คอิน</button>
  </div>

  <!-- หน้าสำเร็จ -->
  <div id="screenSuccess">
    <div style="text-align:center;padding:20px">
      <div style="font-size:60px">✅</div>
      <h2 style="color:#2e7d32;margin-top:8px">เช็คอินสำเร็จ!</h2>
      <p id="successMsg" style="margin-top:8px;color:#555;font-size:14px;white-space:pre-line"></p>
    </div>
  </div>

  <button class="btn btn-gray" id="retryBtn" onclick="init()" style="display:none;margin-top:10px">🔄 ลองใหม่</button>
  <button class="btn" onclick="toggleDebug()" style="margin-top:8px;background:#eeeeee;color:#666;font-size:12px">🔧 Debug</button>
  <div id="debugBox"></div>
</div>

<script>
// ===== ตั้งค่า =====
var LIFF_ID = '2010044858-D1EyF8AC';
var API_URL = 'https://script.google.com/macros/s/AKfycbzXFqoLRRhw6nPZtf2jv5dJngLsWDu91BlHxxbDJyFECnt7aM__armmZ7ODg-EeEn3ZGQ/exec';
var LOCATIONS = [
  { name: 'สำนักงานใหญ่ / คลังสินค้า', lat: 13.7368098, lng: 100.8028095 },
  { name: 'มินิออฟฟิศ ลาดพร้าว 114',   lat: 13.770801,  lng: 100.6220377 }
];
var GPS_RADIUS = 50;
// ===================

var userId = '', userName = '', locOk = false, photoB64 = '';
var currentLat = 0, currentLng = 0;
var selectedLocation = null, selectedLocationName = '';
var cameraStream = null;
var debugData = {};

// ── UI helpers ──
function setStatus(msg, type) {
  var el = document.getElementById('statusBox');
  el.textContent = msg;
  el.className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
  el.style.display = 'block';
}

function setBar(n, state) {
  for (var i = 1; i <= 4; i++) {
    var el = document.getElementById('b' + i);
    if      (i < n)  el.className = 'bar done';
    else if (i === n) el.className = 'bar ' + state;
    else              el.className = 'bar';
  }
}

function showRetry() { document.getElementById('retryBtn').style.display = 'block'; }
function hideRetry() { document.getElementById('retryBtn').style.display = 'none'; }

function showScreen(id) {
  ['screenRegister', 'screenCheckin', 'screenSuccess'].forEach(function(s) {
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
  if (id === 'screenCheckin') {
    photoB64 = '';
    document.getElementById('photoPreview').style.display = 'none';
    document.getElementById('captureBtn').style.display   = 'none';
    document.getElementById('retakeBtn').style.display    = 'none';
    document.getElementById('cameraVideo').style.display  = 'none';
    document.getElementById('submitBtn').disabled = true;
    startCamera();
  }
}

function toggleDebug() {
  var el = document.getElementById('debugBox');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
  el.textContent = JSON.stringify(debugData, null, 2);
}

function goHome() {
  if (typeof liff !== 'undefined' && liff.isInClient && liff.isInClient()) {
    liff.closeWindow();
  } else {
    window.history.back();
  }
}

function callAPI(data) {
  return fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify(data),
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    redirect: 'follow'
  }).then(function(r) { return r.json(); });
}

// ── เริ่มต้นแอป ──
async function init() {
  hideRetry();
  showScreen('');
  try {
    setStatus('⏳ กำลังเชื่อมต่อ LINE...', 'loading');
    setBar(1, 'active');

    if (typeof liff === 'undefined') throw new Error('LIFF SDK โหลดไม่ได้ — ตรวจสอบ Internet');

    try {
      await Promise.race([
        liff.init({ liffId: LIFF_ID }),
        new Promise(function(_, reject) {
          setTimeout(function() {
            reject({ code: 'TIMEOUT', message: 'liff.init ค้างเกิน 10 วินาที' });
          }, 10000);
        })
      ]);
    } catch (liffErr) {
      var ec = liffErr.code || 'NO_CODE';
      var em = liffErr.message || String(liffErr);
      debugData.liffError = { code: ec, message: em };
      setStatus('❌ LIFF Error: ' + ec + '\n' + em, 'error');
      showRetry(); return;
    }

    if (!liff.isLoggedIn()) { liff.login(); return; }
    setBar(1, 'done');

    setStatus('⏳ กำลังโหลดข้อมูล...', 'loading');
    setBar(2, 'active');
    var profile = await liff.getProfile();
    userId   = profile.userId;
    userName = profile.displayName;
    debugData.profile = { userId: userId, name: userName };
    setBar(2, 'done');

    setStatus('⏳ กำลังตรวจสอบข้อมูลพนักงาน...', 'loading');
    setBar(3, 'active');
    var result = await callAPI({ action: 'getEmployee', userId: userId });
    debugData.getEmployee = result;

    if (result.found) {
      setBar(3, 'done');
      setStatus('✅ ยินดีต้อนรับ ' + result.name, 'success');
      document.getElementById('empInfo').innerHTML =
        '<b>👤 ' + result.name + '</b><br>แผนก: ' + result.dept +
        (result.position ? '<br>ตำแหน่ง: ' + result.position : '');
      showScreen('screenCheckin');
    } else {
      setBar(3, 'done');
      setStatus('📝 กรุณาลงทะเบียนพนักงานใหม่', '');
      showScreen('screenRegister');
    }

  } catch (err) {
    debugData.error = String(err);
    setStatus('❌ ' + (err.message || String(err)), 'error');
    showRetry();
  }
}

// ── ลงทะเบียน ──
async function submitRegister() {
  var name     = document.getElementById('regName').value.trim();
  var dept     = document.getElementById('regDept').value;
  var position = document.getElementById('regPosition').value.trim();
  var phone    = document.getElementById('regPhone').value.trim();
  if (!name) { alert('กรุณากรอกชื่อ-นามสกุล'); return; }
  if (!dept) { alert('กรุณาเลือกแผนก'); return; }

  setStatus('⏳ กำลังลงทะเบียน...', 'loading');
  try {
    var result = await callAPI({
      action: 'register', userId: userId, name: name,
      dept: dept, position: position, phone: phone, lineDisplayName: userName
    });
    if (result.success) {
      setStatus('✅ ลงทะเบียนสำเร็จ!', 'success');
      setTimeout(init, 1500);
    } else {
      setStatus('❌ ลงทะเบียนไม่สำเร็จ: ' + (result.error || ''), 'error');
    }
  } catch (e) { setStatus('❌ ' + String(e), 'error'); }
}

// ── เลือกสถานที่ ──
function onLocationChange() {
  var sel    = document.getElementById('locationSelect').value;
  var gpsBtn = document.getElementById('gpsBtn');
  if (sel === '') {
    gpsBtn.disabled = true;
    selectedLocation = null;
  } else {
    selectedLocation     = LOCATIONS[parseInt(sel)];
    selectedLocationName = selectedLocation.name;
    gpsBtn.disabled = false;
    setStatus('📍 เลือก: ' + selectedLocation.name + '\nกด "ตรวจสอบตำแหน่ง GPS" ได้เลย', '');
  }
  locOk = false;
  document.getElementById('submitBtn').disabled = true;
}

// ── รีเซ็ตปุ่ม GPS ──
function resetGpsBtn() {
  var btn = document.getElementById('gpsBtn');
  btn.disabled    = false;
  btn.textContent = '📍 ตรวจสอบตำแหน่ง GPS';
}

// ── ตรวจสอบ GPS (พร้อม safety timeout + fallback) ──
function checkGPS() {
  if (!selectedLocation) { alert('กรุณาเลือกสถานที่ก่อน'); return; }
  setStatus('⏳ กำลังหาตำแหน่ง GPS...', 'loading');
  setBar(3, 'active');
  document.getElementById('gpsBtn').disabled    = true;
  document.getElementById('gpsBtn').textContent = '⏳ กำลังหา GPS...';

  if (!navigator.geolocation) {
    setStatus('❌ เครื่องนี้ไม่รองรับ GPS', 'error');
    resetGpsBtn(); return;
  }

  var done = false;

  var safetyTimer = setTimeout(function() {
    if (done) return;
    done = true;
    setStatus(
      '❌ GPS ค้างนานเกินไป ลองทำตามนี้:\n' +
      '1. ปิด-เปิด Location ในการตั้งค่าโทรศัพท์\n' +
      '2. ออกไปที่โล่งแล้วลองใหม่\n' +
      '3. รีสตาร์ท LINE แล้วลองอีกครั้ง',
      'error'
    );
    resetGpsBtn();
  }, 18000);

  function onSuccess(pos) {
    if (done) return;
    done = true;
    clearTimeout(safetyTimer);

    var lat  = pos.coords.latitude;
    var lng  = pos.coords.longitude;
    var acc  = Math.round(pos.coords.accuracy);
    var dist = Math.round(haversine(lat, lng, selectedLocation.lat, selectedLocation.lng));

    currentLat = lat;
    currentLng = lng;
    debugData.gps = { lat: lat, lng: lng, accuracy: acc, distToTarget: dist };
    setBar(3, 'done');

    if (dist <= GPS_RADIUS) {
      locOk = true;
      setStatus(
        '✅ GPS ผ่าน!\n📍 ' + selectedLocation.name +
        '\n📏 ระยะห่าง: ' + dist + ' ม. (ความแม่นยำ ±' + acc + ' ม.)',
        'success'
      );
    } else {
      locOk = false;
      setStatus(
        '❌ อยู่นอกพื้นที่!\n📍 ' + selectedLocation.name +
        '\n📏 ระยะห่าง: ' + dist + ' ม. (ต้องอยู่ภายใน ' + GPS_RADIUS + ' ม.)' +
        '\n💡 ถ้าอยู่ในอาคาร ลองออกไปที่โล่งแล้วลองใหม่',
        'error'
      );
    }
    if (locOk && photoB64) document.getElementById('submitBtn').disabled = false;
    resetGpsBtn();
  }

  function onError(err) {
    if (done) return;
    done = true;
    clearTimeout(safetyTimer);
    var msg = err.code === 1 ? 'ไม่อนุญาต GPS\nไปที่ Settings → LINE → Location → Allow'
            : err.code === 2 ? 'หา GPS ไม่เจอ ลองออกไปที่โล่ง'
            : err.code === 3 ? 'GPS หมดเวลา ลองกดใหม่อีกครั้ง'
            : err.message;
    setStatus('❌ GPS Error: ' + msg, 'error');
    resetGpsBtn();
  }

  // ลอง high accuracy → fallback low accuracy
  navigator.geolocation.getCurrentPosition(
    onSuccess,
    function(err) {
      if (done) return;
      setStatus('⏳ กำลังหาตำแหน่ง (โหมดสำรอง)...', 'loading');
      navigator.geolocation.getCurrentPosition(
        onSuccess, onError,
        { enableHighAccuracy: false, timeout: 8000, maximumAge: 30000 }
      );
    },
    { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
  );
}

function haversine(lat1, lng1, lat2, lng2) {
  var R    = 6371000;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLng = (lng2 - lng1) * Math.PI / 180;
  var a    = Math.sin(dLat/2) * Math.sin(dLat/2) +
             Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
             Math.sin(dLng/2) * Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// ── กล้อง ──
function startCamera() {
  if (cameraStream) { cameraStream.getTracks().forEach(function(t) { t.stop(); }); }
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
    .then(function(stream) {
      cameraStream = stream;
      var vid = document.getElementById('cameraVideo');
      vid.srcObject = stream;
      vid.style.display = 'block';
      document.getElementById('captureBtn').style.display = 'block';
    })
    .catch(function(err) {
      setStatus('❌ เปิดกล้องไม่ได้: ' + err.message + '\nกรุณาอนุญาตการเข้าถึงกล้องแล้วรีโหลด', 'error');
    });
}

function capturePhoto() {
  var video  = document.getElementById('cameraVideo');
  var canvas = document.createElement('canvas');
  var scale  = Math.min(800 / video.videoWidth, 800 / video.videoHeight, 1);
  canvas.width  = video.videoWidth  * scale;
  canvas.height = video.videoHeight * scale;
  canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
  if (cameraStream) cameraStream.getTracks().forEach(function(t) { t.stop(); });
  var dataUrl = canvas.toDataURL('image/jpeg', 0.75);
  photoB64    = dataUrl.split(',')[1];
  video.style.display = 'none';
  document.getElementById('captureBtn').style.display   = 'none';
  document.getElementById('photoPreview').src           = dataUrl;
  document.getElementById('photoPreview').style.display = 'block';
  document.getElementById('retakeBtn').style.display    = 'block';
  if (locOk && photoB64) document.getElementById('submitBtn').disabled = false;
  debugData.photo = 'ok (' + photoB64.length + ' chars)';
}

function retakePhoto() {
  photoB64 = '';
  document.getElementById('submitBtn').disabled         = true;
  document.getElementById('photoPreview').style.display = 'none';
  document.getElementById('retakeBtn').style.display    = 'none';
  document.getElementById('cameraVideo').style.display  = 'block';
  startCamera();
}

// ── บันทึกเช็คอิน ──
async function submitCheckin() {
  if (!locOk)   { alert('กรุณาตรวจสอบ GPS ก่อน'); return; }
  if (!photoB64) { alert('กรุณาถ่ายรูปก่อน'); return; }

  document.getElementById('submitBtn').disabled = true;
  setStatus('⏳ กำลังบันทึกข้อมูล...', 'loading');
  setBar(4, 'active');

  try {
    var result = await callAPI({
      action:      'saveCheckin',
      userId:      userId,
      lat:         currentLat,
      lng:         currentLng,
      location:    selectedLocationName,
      photoBase64: photoB64
    });
    if (result.success) {
      setBar(4, 'done');
      document.getElementById('successMsg').textContent =
        result.name + ' — ' + result.dept + '\n' + result.time;
      showScreen('screenSuccess');
      setStatus('', 'success');
    } else {
      setStatus('❌ บันทึกไม่สำเร็จ: ' + (result.error || ''), 'error');
      document.getElementById('submitBtn').disabled = false;
    }
  } catch (e) {
    setStatus('❌ ' + String(e), 'error');
    document.getElementById('submitBtn').disabled = false;
  }
}

window.onerror = function(msg, src, line) {
  setStatus('❌ JS Error: ' + msg + '\nLine: ' + line, 'error');
  debugData.jsError = { msg: msg, src: src, line: line };
};

init();
</script>
</body>
</html>
