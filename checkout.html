<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>เช็คเอาท์ เพชรธงชัย</title>
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#1565c0">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#e8f0fe;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:20px}
.card{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:480px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.logo{text-align:center;margin-bottom:16px}
.logo h1{color:#1565c0;font-size:20px}
.logo p{color:#666;font-size:13px}
#statusBox{padding:14px;border-radius:10px;font-size:14px;line-height:1.6;background:#e3f2fd;border:1px solid #90caf9;color:#1565c0}
#statusBox.error{background:#ffebee;border-color:#ef9a9a;color:#c62828}
#statusBox.success{background:#e8f5e9;border-color:#a5d6a7;color:#2e7d32}
.section{margin-top:16px}
label{font-size:14px;color:#555;display:block;margin-bottom:4px;font-weight:bold}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:16px;font-family:'Sarabun',sans-serif;cursor:pointer;margin-top:10px;font-weight:bold}
.btn-blue{background:#1565c0;color:#fff}
.btn-gray{background:#9e9e9e;color:#fff}
.btn:disabled{background:#ccc;cursor:not-allowed}
#cameraVideo{width:100%;border-radius:8px;background:#000;margin-top:6px;display:none}
.photo-preview{width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin-top:8px;display:none}
.emp-box{background:#e3f2fd;padding:12px;border-radius:8px;font-size:14px;line-height:1.8}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🚪 เช็คเอาท์เพชรธงชัย</h1>
    <p>บริษัท เพชรธงชัย เทรดดิ้ง จำกัด</p>
  </div>
  <div id="statusBox">⏳ กำลังโหลด...</div>

  <div id="screenMain" style="display:none">
    <div class="section">
      <div class="emp-box" id="empInfo"></div>
    </div>
    <div class="section">
      <label>📷 ถ่ายรูปยืนยันการออกงาน *</label>
      <video id="cameraVideo" autoplay playsinline></video>
      <img id="photoPreview" class="photo-preview">
      <button class="btn btn-gray" id="captureBtn" onclick="capturePhoto()" style="display:none">📷 ถ่ายรูป</button>
      <button class="btn btn-gray" id="retakeBtn"  onclick="retakePhoto()"  style="display:none">🔄 ถ่ายใหม่</button>
    </div>
    <button class="btn btn-blue" id="submitBtn" onclick="submitCheckout()" disabled>🚪 บันทึกเช็คเอาท์</button>
  </div>

  <div id="screenSuccess" style="display:none;text-align:center;padding:20px">
    <div style="font-size:64px">🎉</div>
    <h2 style="color:#1565c0;margin-top:8px">เช็คเอาท์สำเร็จ!</h2>
    <p id="successMsg" style="margin-top:12px;color:#555;font-size:14px;line-height:2"></p>
    <button class="btn btn-blue" onclick="liff.closeWindow()" style="margin-top:20px">ปิดหน้าต่าง</button>
  </div>
</div>

<script>
var LIFF_ID = '2010044858-D1EyF8AC';
var API_URL = 'https://script.google.com/macros/s/AKfycbzXFqoLRRhw6nPZtf2jv5dJngLsWDu91BlHxxbDJyFECnt7aM__armmZ7ODg-EeEn3ZGQ/exec';

var userId = '', photoB64 = '', cameraStream = null;

liff.init({ liffId: LIFF_ID })
  .then(function() {
    if (!liff.isLoggedIn()) { liff.login(); return Promise.reject('login'); }
    userId = liff.getContext().userId;
    return callAPI({ action: 'getEmployee', userId: userId });
  })
  .then(function(res) {
    if (res.found) {
      document.getElementById('empInfo').innerHTML =
        '<b>👤 '+res.name+'</b><br>แผนก: '+res.dept+
        (res.position ? '<br>ตำแหน่ง: '+res.position : '');
      setStatus('📷 ถ่ายรูปเพื่อบันทึกเวลาออก', '');
      document.getElementById('screenMain').style.display = 'block';
      startCamera();
    } else {
      setStatus('❌ ไม่พบข้อมูลพนักงาน\nกรุณาลงทะเบียน Check-in ก่อน', 'error');
    }
  })
  .catch(function(err) { if (err !== 'login') setStatus('❌ '+err.message, 'error'); });

function setStatus(msg, type) {
  var el = document.getElementById('statusBox');
  el.textContent = msg;
  el.className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
}

function startCamera() {
  if (cameraStream) cameraStream.getTracks().forEach(function(t){t.stop();});
  navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user' }, audio:false })
    .then(function(stream) {
      cameraStream = stream;
      var vid = document.getElementById('cameraVideo');
      vid.srcObject = stream;
      vid.style.display = 'block';
      document.getElementById('captureBtn').style.display = 'block';
    })
    .catch(function(err) { setStatus('❌ เปิดกล้องไม่ได้: '+err.message, 'error'); });
}

function capturePhoto() {
  var video = document.getElementById('cameraVideo');
  var canvas = document.createElement('canvas');
  var scale  = Math.min(800/video.videoWidth, 800/video.videoHeight, 1);
  canvas.width  = video.videoWidth  * scale;
  canvas.height = video.videoHeight * scale;
  canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
  if (cameraStream) cameraStream.getTracks().forEach(function(t){t.stop();});
  var dataUrl = canvas.toDataURL('image/jpeg', 0.75);
  photoB64    = dataUrl.split(',')[1];
  document.getElementById('cameraVideo').style.display  = 'none';
  document.getElementById('captureBtn').style.display   = 'none';
  document.getElementById('photoPreview').src           = dataUrl;
  document.getElementById('photoPreview').style.display = 'block';
  document.getElementById('retakeBtn').style.display    = 'block';
  document.getElementById('submitBtn').disabled         = false;
}

function retakePhoto() {
  photoB64 = '';
  document.getElementById('submitBtn').disabled         = true;
  document.getElementById('photoPreview').style.display = 'none';
  document.getElementById('retakeBtn').style.display    = 'none';
  startCamera();
}

async function submitCheckout() {
  if (!photoB64) { alert('กรุณาถ่ายรูปก่อน'); return; }
  var btn = document.getElementById('submitBtn');
  btn.disabled = true;
  setStatus('⏳ กำลังบันทึก...', '');
  try {
    var res = await callAPI({ action:'saveCheckout', userId:userId, photoBase64:photoB64 });
    if (res.success) {
      document.getElementById('screenMain').style.display   = 'none';
      document.getElementById('screenSuccess').style.display = 'block';
      document.getElementById('successMsg').innerHTML =
        'ชื่อ: <b>'+res.name+'</b><br>แผนก: <b>'+res.dept+'</b><br>เวลาออก: <b>'+res.time+'</b>';
    } else {
      setStatus('❌ '+(res.error||'เกิดข้อผิดพลาด'), 'error');
      btn.disabled = false;
    }
  } catch(e) { setStatus('❌ '+String(e), 'error'); btn.disabled = false; }
}

function callAPI(data) {
  return fetch(API_URL, { method:'POST', body:JSON.stringify(data),
    headers:{'Content-Type':'text/plain;charset=utf-8'}, redirect:'follow' })
    .then(function(r){ return r.json(); });
}
</script>
</body>
</html>
