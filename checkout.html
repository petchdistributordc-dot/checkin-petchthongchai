<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>เช็คเอาท์ เพชรธงชัย</title>
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#1565c0">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#e8f0fe;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:20px}
.card{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:480px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.logo{text-align:center;margin-bottom:16px}
.logo h1{color:#1565c0;font-size:20px}
.logo p{color:#666;font-size:13px}
#statusBox{padding:14px;border-radius:10px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-all;background:#e3f2fd;border:1px solid #90caf9;color:#1565c0}
#statusBox.error{background:#ffebee;border-color:#ef9a9a;color:#c62828}
#statusBox.success{background:#e8f5e9;border-color:#a5d6a7;color:#2e7d32}
.section{margin-top:16px}
label{font-size:14px;color:#333;display:block;margin-bottom:4px;font-weight:bold}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:16px;font-family:'Sarabun',sans-serif;cursor:pointer;margin-top:10px;font-weight:bold}
.btn-blue{background:#1565c0;color:#fff}
.btn-gray{background:#9e9e9e;color:#fff}
.btn-green{background:#2e7d32;color:#fff}
.btn:disabled{background:#ccc;cursor:not-allowed}
#cameraVideo{width:100%;border-radius:8px;background:#000;margin-top:6px;display:none}
.photo-preview{width:100%;max-height:220px;object-fit:cover;border-radius:8px;margin-top:8px;display:none}
.emp-box{background:#e3f2fd;padding:12px;border-radius:8px;font-size:14px;line-height:2}
.dist-box{background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:10px 14px;font-size:14px;margin-top:10px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🚪 เช็คเอาท์เพชรธงชัย</h1>
    <p>บริษัท เพชรธงชัย เทรดดิ้ง จำกัด</p>
  </div>
  <div id="statusBox">⏳ กำลังเชื่อมต่อ LINE...</div>

  <div id="screenMain" style="display:none">
    <div class="section">
      <div class="emp-box" id="empInfo"></div>
      <div class="dist-box" id="distBox">📍 กำลังระบุตำแหน่ง...</div>
    </div>
    <div class="section">
      <label>📷 ถ่ายรูปยืนยันการออกงาน *</label>
      <video id="cameraVideo" autoplay playsinline></video>
      <img id="photoPreview" class="photo-preview" alt="รูปที่ถ่าย">
      <button class="btn btn-gray" id="captureBtn" onclick="capturePhoto()" style="display:none">📷 ถ่ายรูป</button>
      <button class="btn btn-gray" id="retakeBtn"  onclick="retakePhoto()"  style="display:none">🔄 ถ่ายใหม่</button>
    </div>
    <button class="btn btn-blue" id="submitBtn" onclick="submitCheckout()" disabled>🚪 บันทึกเช็คเอาท์</button>
  </div>

  <div id="screenSuccess" style="display:none;text-align:center;padding:20px">
    <div style="font-size:64px">🎉</div>
    <h2 style="color:#1565c0;margin-top:8px">เช็คเอาท์สำเร็จ!</h2>
    <p id="successMsg" style="margin-top:12px;color:#555;font-size:15px;line-height:2"></p>
    <div id="distResult" style="margin-top:10px;background:#fff8e1;border-radius:8px;padding:10px;font-size:14px;display:none"></div>
    <!-- ✅ เปลี่ยนจาก liff.closeWindow() เป็นแค่แสดงข้อความ ไม่มี popup -->
    <div style="margin-top:20px;color:#888;font-size:13px">✅ บันทึกเสร็จแล้ว สามารถปิดหน้าต่างนี้ได้</div>
  </div>

  <button class="btn btn-gray" id="retryBtn" onclick="init()" style="display:none;margin-top:10px">🔄 ลองใหม่</button>
</div>

<script>
var LIFF_ID  = '2010044858-D1EyF8AC';
var API_URL  = 'https://script.google.com/macros/s/AKfycbzXFqoLRRhw6nPZtf2jv5dJngLsWDu91BlHxxbDJyFECnt7aM__armmZ7ODg-EeEn3ZGQ/exec';

var userId = '', photoB64 = '', cameraStream = null;
var userLat = null, userLng = null;

async function init() {
  document.getElementById('retryBtn').style.display = 'none';
  setStatus('⏳ กำลังเชื่อมต่อ LINE...', '');
  try {
    if (typeof liff === 'undefined') throw new Error('LIFF SDK โหลดไม่ได้');
    await Promise.race([
      liff.init({ liffId: LIFF_ID }),
      new Promise(function(_, reject) {
        setTimeout(function() { reject(new Error('เชื่อมต่อ LINE ไม่ได้ (Timeout)')); }, 10000);
      })
    ]);
    if (!liff.isLoggedIn()) { liff.login(); return; }
    userId = liff.getContext().userId;
    setStatus('⏳ กำลังโหลดข้อมูลพนักงาน...', '');
    var res = await callAPI({ action: 'getEmployee', userId: userId });
    if (res.found) {
      document.getElementById('empInfo').innerHTML =
        '<b>👤 ' + res.name + '</b><br>🏢 แผนก: ' + res.dept +
        (res.position ? '<br>💼 ตำแหน่ง: ' + res.position : '');
      setStatus('📷 ถ่ายรูปเพื่อบันทึกเวลาออกงาน', '');
      document.getElementById('screenMain').style.display = 'block';

      // ✅ ดึง GPS ทันทีหลังโหลดข้อมูลพนักงาน แสดงระยะล่วงหน้า
      getLocation();
      startCamera();
    } else {
      setStatus('❌ ไม่พบข้อมูลพนักงาน\nกรุณาเช็คอินลงทะเบียนก่อน', 'error');
    }
  } catch(err) {
    setStatus('❌ ' + (err.message || String(err)), 'error');
    document.getElementById('retryBtn').style.display = 'block';
  }
}

// ✅ ฟังก์ชันดึง GPS แยกออกมา แสดงระยะก่อนกดบันทึก
function getLocation() {
  var distBox = document.getElementById('distBox');
  distBox.style.display = 'block';
  distBox.textContent = '📍 กำลังระบุตำแหน่ง...';
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      distBox.innerHTML = '📍 ตำแหน่งของคุณ<br>' +
        '🌐 ' + userLat.toFixed(6) + ', ' + userLng.toFixed(6);
    },
    function(err) {
      distBox.innerHTML = '⚠️ ระบุตำแหน่งไม่ได้ — ระยะทางจะไม่แสดงใน Sheet<br><small>' + err.message + '</small>';
      distBox.style.background = '#ffebee';
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
}

function setStatus(msg, type) {
  var el = document.getElementById('statusBox');
  el.textContent = msg;
  el.className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
}

function startCam
