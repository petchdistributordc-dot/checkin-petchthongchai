<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>เช็คเอาท์ เพชรธงชัย</title>
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#1565c0">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#e8f0fe;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:20px}
.card{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:480px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.logo{text-align:center;margin-bottom:16px}
.logo h1{color:#1565c0;font-size:20px}
.logo p{color:#666;font-size:13px}
#statusBox{padding:14px;border-radius:10px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-all;background:#e3f2fd;border:1px solid #90caf9;color:#1565c0}
#statusBox.error{background:#ffebee;border-color:#ef9a9a;color:#c62828}
#statusBox.success{background:#e8f5e9;border-color:#a5d6a7;color:#2e7d32}
.section{margin-top:16px}
label{font-size:14px;color:#333;display:block;margin-bottom:4px;font-weight:bold}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:16px;font-family:'Sarabun',sans-serif;cursor:pointer;margin-top:10px;font-weight:bold}
.btn-blue{background:#1565c0;color:#fff}
.btn-gray{background:#9e9e9e;color:#fff}
.btn:disabled{background:#ccc;cursor:not-allowed}
#cameraVideo{width:100%;border-radius:8px;background:#000;margin-top:6px;display:none}
.photo-preview{width:100%;max-height:220px;object-fit:cover;border-radius:8px;margin-top:8px;display:none}
.emp-box{background:#e3f2fd;padding:12px;border-radius:8px;font-size:14px;line-height:2}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🚪 เช็คเอาท์เพชรธงชัย</h1>
    <p>บริษัท เพชรธงชัย เทรดดิ้ง จำกัด</p>
  </div>
  <div id="statusBox">⏳ กำลังเชื่อมต่อ LINE...</div>

  <div id="screenMain" style="display:none">
    <div class="section">
      <div class="emp-box" id="empInfo"></div>
    </div>
    <div class="section">
      <label>📷 ถ่ายรูปยืนยันการออกงาน *</label>
      <video id="cameraVideo" autoplay playsinline></video>
      <img id="photoPreview" class="photo-preview" alt="รูปที่ถ่าย">
      <button class="btn btn-gray" id="captureBtn" onclick="capturePhoto()" style="display:none">📷 ถ่ายรูป</button>
      <button class="btn btn-gray" id="retakeBtn"  onclick="retakePhoto()"  style="display:none">🔄 ถ่ายใหม่</button>
    </div>
    <button class="btn btn-blue" id="submitBtn" onclick="submitCheckout()" disabled>🚪 บันทึกเช็คเอาท์</button>
  </div>

  <div id="screenSuccess" style="display:none;text-align:center;padding:20px">
    <div style="font-size:64px">🎉</div>
    <h2 style="color:#1565c0;margin-top:8px">เช็คเอาท์สำเร็จ!</h2>
    <p id="successMsg" style="margin-top:12px;color:#555;font-size:15px;line-height:2"></p>
    <button class="btn btn-blue" onclick="liff.closeWindow()" style="margin-top:20px">ปิดหน้าต่าง</button>
  </div>

  <button class="btn btn-gray" id="retryBtn" onclick="init()" style="display:none;margin-top:10px">🔄 ลองใหม่</button>
</div>

<script>
var LIFF_ID = '2010044858-D1EyF8AC';
var API_URL = 'https://script.google.com/macros/s/AKfycbxASYVHXD_RkR6Mqi6KeZRKPxzIG3Dvee7x76HyacPWN_flMkqmRmvFeZsKSJGjTfyRcw/exec';

var userId = '', photoB64 = '', cameraStream = null;

async function init() {
  document.getElementById('retryBtn').style.display = 'none';
  setStatus('⏳ กำลังเชื่อมต่อ LINE...', '');

  try {
    if (typeof liff === 'undefined') throw new Error('LIFF SDK โหลดไม่ได้ กรุณาตรวจสอบ Internet');

    // init พร้อม timeout 10 วินาที
    try {
      await Promise.race([
        liff.init({ liffId: LIFF_ID }),
        new Promise(function(_, reject) {
          setTimeout(function() {
            reject(new Error(
              'เชื่อมต่อ LINE ไม่ได้ (Timeout)\n\n' +
              '✅ กรุณาเปิดผ่านลิงก์นี้ใน LINE Chat:\n' +
              'https://liff.line.me/' + LIFF_ID + '/checkout.html'
            ));
          }, 10000);
        })
      ]);
    } catch(le) {
      throw new Error(le.message || String(le));
    }

    if (!liff.isLoggedIn()) { liff.login(); return; }

    userId = liff.getContext().userId;
    setStatus('⏳ กำลังโหลดข้อมูลพนักงาน...', '');

    var res = await callAPI({ action: 'getEmployee', userId: userId });

    if (res.found) {
      document.getElementById('empInfo').innerHTML =
        '<b>👤 ' + res.name + '</b><br>' +
        '🏢 แผนก: ' + res.dept +
        (res.position ? '<br>💼 ตำแหน่ง: ' + res.position : '');
      setStatus('📷 ถ่ายรูปเพื่อบันทึกเวลาออกงาน', '');
      document.getElementById('screenMain').style.display = 'block';
      startCamera();
    } else {
      setStatus('❌ ไม่พบข้อมูลพนักงาน\nกรุณาเช็คอินลงทะเบียนก่อน', 'error');
    }

  } catch(err) {
    setStatus('❌ ' + (err.message || String(err)), 'error');
    document.getElementById('retryBtn').style.display = 'block';
  }
}

function setStatus(msg, type) {
  var el = document.getElementById('statusBox');
  el.textContent = msg;
  el.className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
}

function startCamera() {
  if (cameraStream) cameraStream.getTracks().forEach(function(t) { t.stop(); });
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
    .then(function(stream) {
      cameraStream = stream;
      var vid = document.getElementById('cameraVideo');
      vid.srcObject = stream;
      vid.style.display = 'block';
      document.getElementById('captureBtn').style.display = 'block';
    })
    .catch(function(err) {
      setStatus('❌ เปิดกล้องไม่ได้: ' + err.message + '\nกรุณาอนุญาตการเข้าถึงกล้อง', 'error');
    });
}

function capturePhoto() {
  var video  = document.getElementById('cameraVideo');
  var canvas = document.createElement('canvas');
  var scale  = Math.min(800 / video.videoWidth, 800 / video.videoHeight, 1);
  canvas.width  = video.videoWidth  * scale;
  canvas.height = video.videoHeight * scale;
  canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);

  if (cameraStream) cameraStream.getTracks().forEach(function(t) { t.stop(); });

  var dataUrl = canvas.toDataURL('image/jpeg', 0.75);
  photoB64    = dataUrl.split(',')[1];

  document.getElementById('cameraVideo').style.display  = 'none';
  document.getElementById('captureBtn').style.display   = 'none';
  document.getElementById('photoPreview').src           = dataUrl;
  document.getElementById('photoPreview').style.display = 'block';
  document.getElementById('retakeBtn').style.display    = 'block';
  document.getElementById('submitBtn').disabled         = false;
}

function retakePhoto() {
  photoB64 = '';
  document.getElementById('submitBtn').disabled         = true;
  document.getElementById('photoPreview').style.display = 'none';
  document.getElementById('retakeBtn').style.display    = 'none';
  startCamera();
}

async function submitCheckout() {
  if (!photoB64) { alert('กรุณาถ่ายรูปก่อน'); return; }
  var btn = document.getElementById('submitBtn');
  btn.disabled    = true;
  btn.textContent = '⏳ กำลังบันทึก...';
  setStatus('⏳ กำลังบันทึกเวลาออกงาน...', '');
  try {
    var res = await callAPI({ action: 'saveCheckout', userId: userId, photoBase64: photoB64 });
    if (res.success) {
      document.getElementById('screenMain').style.display    = 'none';
      document.getElementById('screenSuccess').style.display = 'block';
      document.getElementById('successMsg').innerHTML =
        'ชื่อ: <b>' + res.name + '</b><br>' +
        'แผนก: <b>' + res.dept + '</b><br>' +
        'เวลาออก: <b>' + res.time + '</b>';
      setStatus('', 'success');
    } else {
      setStatus('❌ ' + (res.error || 'เกิดข้อผิดพลาด'), 'error');
      btn.disabled    = false;
      btn.textContent = '🚪 บันทึกเช็คเอาท์';
    }
  } catch(e) {
    setStatus('❌ ' + String(e), 'error');
    btn.disabled    = false;
    btn.textContent = '🚪 บันทึกเช็คเอาท์';
  }
}

function callAPI(data) {
  return fetch(API_URL, {
    method: 'POST', body: JSON.stringify(data),
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    redirect: 'follow'
  }).then(function(r) { return r.json(); });
}

init();
</script>
</body>
</html>
